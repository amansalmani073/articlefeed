<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings | ArticleFeed Admin</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f7fb;
padding:30px;
}

.container{
max-width:1000px;
margin:auto;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h1{
color:#16a34a;
}

.back-btn{
background:#dc2626;
color:white;
text-decoration:none;
padding:12px 20px;
border-radius:8px;
}

.settings-box{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.form-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:8px;
font-weight:600;
}

input,
textarea{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

.save-btn{
background:#16a34a;
color:white;
border:none;
padding:14px 25px;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
}

.save-btn:hover{
background:#15803d;
}

#message{
margin-top:20px;
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

<h1>Website Settings</h1>

<a href="dashboard.html" class="back-btn">
Dashboard
</a>

</div>

<div class="settings-box">

<form id="settingsForm">

<div class="form-group">
<label>Website Name</label>
<input
type="text"
id="siteName"
placeholder="ArticleFeed">
</div>

<div class="form-group">
<label>Website Logo URL</label>
<input
type="text"
id="siteLogo"
placeholder="https://example.com/logo.png">
</div>

<div class="form-group">
<label>Footer Text</label>
<input
type="text"
id="footerText"
placeholder="© 2026 ArticleFeed. All Rights Reserved.">
</div>

<div class="form-group">
<label>Homepage Meta Title</label>
<input
type="text"
id="metaTitle">
</div>

<div class="form-group">
<label>Homepage Meta Description</label>
<textarea
id="metaDescription"
rows="4"></textarea>
</div>

<div class="form-group">
<label>Google Analytics ID</label>
<input
type="text"
id="analyticsId"
placeholder="G-XXXXXXXXXX">
</div>

<button
type="submit"
class="save-btn">
Save Settings
</button>

<div id="message"></div>

</form>

</div>

</div>

<script type="module">

import { db } from "../js/firebase.js";

import {
doc,
setDoc,
getDoc
}
from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const form =
document.getElementById("settingsForm");

const message =
document.getElementById("message");

async function loadSettings(){

try{

const docRef =
doc(db,"settings","website");

const docSnap =
await getDoc(docRef);

if(docSnap.exists()){

const data =
docSnap.data();

siteName.value =
data.siteName || "";

siteLogo.value =
data.siteLogo || "";

footerText.value =
data.footerText || "";

metaTitle.value =
data.metaTitle || "";

metaDescription.value =
data.metaDescription || "";

analyticsId.value =
data.analyticsId || "";

}

}catch(error){

console.error(error);

}

}

form.addEventListener(
"submit",
async(e)=>{

e.preventDefault();

try{

await setDoc(
doc(db,"settings","website"),
{
siteName:
siteName.value,

siteLogo:
siteLogo.value,

footerText:
footerText.value,

metaTitle:
metaTitle.value,

metaDescription:
metaDescription.value,

analyticsId:
analyticsId.value
}
);

message.style.color =
"green";

message.innerHTML =
"Settings Saved Successfully";

}catch(error){

message.style.color =
"red";

message.innerHTML =
error.message;

}

});

loadSettings();

</script>

</body>
</html>
