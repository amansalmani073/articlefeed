<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>SEO Settings | ArticleFeed Admin</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../css/admin.css"></head><body><div class="admin-shell"><aside class="sidebar"><a class="admin-brand" href="dashboard.html">Article<span>Feed</span></a><nav class="admin-nav"><a href="dashboard.html">Dashboard</a><a href="editor.html">Create article</a><a href="posts.html">Manage articles</a><a href="settings.html">SEO settings</a><a href="../index.html" target="_blank" rel="noopener">View website</a><button id="logoutBtn" class="logout-btn">Sign out</button></nav></aside><main class="admin-main"><header class="topbar"><div><h1>Website and SEO settings</h1><p class="muted">Store global site information used by future templates or build scripts.</p></div></header><form id="settingsForm" class="panel"><div class="form-grid"><label class="form-group"><span>Website name</span><input id="siteName" value="ArticleFeed"></label><label class="form-group"><span>Production domain</span><input id="siteUrl" type="url" placeholder="https://example.com"></label><label class="form-group full"><span>Homepage SEO title</span><input id="metaTitle" maxlength="60"></label><label class="form-group full"><span>Homepage meta description</span><textarea id="metaDescription" maxlength="160" rows="3"></textarea></label><label class="form-group"><span>Default author</span><input id="defaultAuthor" value="ArticleFeed Editorial Team"></label><label class="form-group"><span>Google Analytics ID</span><input id="analyticsId" placeholder="G-XXXXXXXXXX"></label><label class="form-group full"><span>Footer text</span><input id="footerText"></label></div><div class="form-actions"><button class="btn" type="submit">Save settings</button></div><div id="message" class="message"></div></form></main></div><script type="module">import{protectPage,logout}from'../js/auth.js';import{db}from'../js/firebase.js';import{doc,setDoc,getDoc,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';protectPage();document.getElementById('logoutBtn').onclick=logout;const ids=['siteName','siteUrl','metaTitle','metaDescription','defaultAuthor','analyticsId','footerText'],msg=document.getElementById('message');async function load(){const s=await getDoc(doc(db,'settings','website'));if(s.exists())ids.forEach(id=>document.getElementById(id).value=s.data()[id]||'')}settingsForm.onsubmit=async e=>{e.preventDefault();try{const data=Object.fromEntries(ids.map(id=>[id,document.getElementById(id).value.trim()]));data.updatedAt=serverTimestamp();await setDoc(doc(db,'settings','website'),data,{merge:true});msg.className='message show success';msg.textContent='Settings saved.'}catch(err){msg.className='message show error';msg.textContent=err.message}};load();</script></body></html>
