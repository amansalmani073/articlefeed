
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Manage Articles | ArticleFeed Admin</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../css/admin.css"></head><body><div class="admin-shell"><aside class="sidebar"><a class="admin-brand" href="dashboard.html">Article<span>Feed</span></a><nav class="admin-nav"><a href="dashboard.html">Dashboard</a><a href="editor.html">Create article</a><a href="posts.html">Manage articles</a><a href="settings.html">SEO settings</a><a href="../index.html" target="_blank" rel="noopener">View website</a><button id="logoutBtn" class="logout-btn">Sign out</button></nav></aside><main class="admin-main"><header class="topbar"><div><h1>Manage articles</h1><p class="muted">Edit, publish, draft, or delete content.</p></div><a class="btn" href="editor.html">+ New article</a></header><section class="panel"><div class="table-toolbar"><input id="searchInput" type="search" placeholder="Search title or category"><select id="statusFilter"><option value="">All statuses</option><option value="published">Published</option><option value="draft">Draft</option></select></div><div class="table-wrap"><table class="data-table"><thead><tr><th>Article</th><th>Category</th><th>Status</th><th>Updated</th><th>Actions</th></tr></thead><tbody id="postsTable"><tr><td colspan="5">Loading…</td></tr></tbody></table></div></section></main></div><script type="module">import{protectPage,logout}from'../js/auth.js';import{db}from'../js/firebase.js';import{collection,getDocs,deleteDoc,doc,orderBy,query}from'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';import{escapeHTML,formatDate}from'../js/site.js';protectPage();document.getElementById('logoutBtn').onclick=logout;let data=[];const tbody=document.getElementById('postsTable');async function load(){try{const s=await getDocs(query(collection(db,'posts'),orderBy('createdAt','desc')));data=s.docs;render()}catch(e){tbody.innerHTML=`<tr><td colspan="5">${escapeHTML(e.message)}</td></tr>`}}function render(){const term=searchInput.value.toLowerCase(),status=statusFilter.value,rows=data.filter(d=>{const p=d.data();return(!term||`${p.title||''} ${p.category||''}`.toLowerCase().includes(term))&&(!status||p.status===status)});tbody.innerHTML=rows.map(d=>{const p=d.data();return`<tr><td><strong>${escapeHTML(p.title||'Untitled')}</strong><div class="muted">${escapeHTML(p.slug||'')}</div></td><td>${escapeHTML(p.category||'General')}</td><td>${escapeHTML(p.status||'draft')}</td><td>${formatDate(p.updatedAt||p.createdAt)}</td><td><div class="actions"><a class="small-btn" href="editor.html?id=${encodeURIComponent(d.id)}">Edit</a><button class="small-btn danger" data-delete="${d.id}">Delete</button></div></td></tr>`}).join('')||'<tr><td colspan="5">No articles found.</td></tr>';tbody.querySelectorAll('[data-delete]').forEach(b=>b.onclick=async()=>{if(confirm('Permanently delete this article?')){await deleteDoc(doc(db,'posts',b.dataset.delete));load()}})}searchInput.oninput=render;statusFilter.onchange=render;load();</script></body></html>
