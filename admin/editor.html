
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Article Editor | ArticleFeed Admin</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../css/admin.css"></head><body><div class="admin-shell"><aside class="sidebar"><a class="admin-brand" href="dashboard.html">Article<span>Feed</span></a><nav class="admin-nav"><a href="dashboard.html">Dashboard</a><a href="editor.html">Create article</a><a href="posts.html">Manage articles</a><a href="settings.html">SEO settings</a><a href="../index.html" target="_blank" rel="noopener">View website</a><button id="logoutBtn" class="logout-btn">Sign out</button></nav></aside><main class="admin-main"><header class="topbar"><div><h1 id="pageTitle">Create article</h1><p class="muted">Complete the content and SEO fields before publishing.</p></div><a class="btn secondary" href="posts.html">Back to articles</a></header><form id="postForm" class="panel"><div class="form-grid"><label class="form-group full"><span>Article title</span><input id="title" required maxlength="120"><span class="counter" id="titleCount">0/120</span></label><label class="form-group"><span>URL slug</span><input id="slug" required pattern="[a-z0-9-]+"><span class="help">Lowercase words separated by hyphens.</span></label><label class="form-group"><span>Category</span><input id="category" list="categories" required><datalist id="categories"><option>ISO Certification</option><option>Compliance</option><option>Business</option><option>Technology</option><option>Management</option><option>Industry News</option></datalist></label><label class="form-group"><span>Author</span><input id="author" value="ArticleFeed Editorial Team"></label><label class="form-group"><span>Status</span><select id="status"><option value="draft">Draft</option><option value="published">Published</option></select></label><label class="form-group full"><span>Featured image URL</span><input id="image" type="url" placeholder="https://..."><span class="help">Use a compressed 1200×675 image. Firebase upload is available below.</span></label><label class="form-group full"><span>Or upload image</span><input id="imageFile" type="file" accept="image/jpeg,image/png,image/webp"><img id="preview" class="preview" src="../assets/article-placeholder.svg" alt="Featured image preview"></label><label class="form-group full"><span>Image alt text</span><input id="imageAlt" maxlength="150" required></label><label class="form-group full"><span>SEO title</span><input id="seoTitle" maxlength="60" required><span class="counter" id="seoCount">0/60</span></label><label class="form-group full"><span>Meta description</span><textarea id="metaDescription" rows="3" maxlength="160" required></textarea><span class="counter" id="metaCount">0/160</span></label><label class="form-group full"><span>Focus keywords</span><input id="keyword" placeholder="Primary keyword, related keyword"></label><label class="form-group full"><span>Article content</span><textarea id="content" rows="20" required placeholder="Use semantic HTML such as &lt;h2&gt;, &lt;p&gt;, &lt;ul&gt;..."></textarea><span class="help">Only trusted administrators should enter HTML.</span></label></div><div class="form-actions"><button class="btn" type="submit">Save article</button><a class="btn secondary" href="posts.html">Cancel</a></div><div id="message" class="message" role="status"></div></form></main></div><script type="module">import{protectPage,logout}from'../js/auth.js';import{db,storage}from'../js/firebase.js';import{doc,getDoc,setDoc,serverTimestamp}from'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';import{ref,uploadBytes,getDownloadURL}from'https://www.gstatic.com/firebasejs/10.13.2/firebase-storage.js';import{slugify,safeURL}from'../js/site.js';protectPage();document.getElementById('logoutBtn').onclick=logout;const id=new URLSearchParams(location.search).get('id'),form=document.getElementById('postForm'),msg=document.getElementById('message');let createdAt=null;function count(el,out,max){const run=()=>out.textContent=`${el.value.length}/${max}`;el.oninput=run;run()}count(title,titleCount,120);count(seoTitle,seoCount,60);count(metaDescription,metaCount,160);title.addEventListener('input',()=>{if(!slug.dataset.edited)slug.value=slugify(title.value)});slug.addEventListener('input',()=>slug.dataset.edited='1');image.oninput=()=>{preview.src=safeURL(image.value)||'../assets/article-placeholder.svg'};imageFile.onchange=()=>{const f=imageFile.files[0];if(f)preview.src=URL.createObjectURL(f)};async function init(){if(!id)return;pageTitle.textContent='Edit article';const s=await getDoc(doc(db,'posts',id));if(!s.exists()){msg.className='message show error';msg.textContent='Article not found.';return}const p=s.data();createdAt=p.createdAt;for(const key of ['title','slug','category','author','status','image','imageAlt','seoTitle','metaDescription','keyword','content'])if(document.getElementById(key))document.getElementById(key).value=p[key]||'';preview.src=safeURL(p.image)||'../assets/article-placeholder.svg';slug.dataset.edited='1';title.dispatchEvent(new Event('input'));seoTitle.dispatchEvent(new Event('input'));metaDescription.dispatchEvent(new Event('input'))}form.onsubmit=async e=>{e.preventDefault();msg.className='message show';msg.textContent='Saving…';try{let imageUrl=image.value.trim();const file=imageFile.files[0];if(file){if(file.size>3*1024*1024)throw new Error('Image must be smaller than 3 MB.');const fileRef=ref(storage,`posts/${Date.now()}-${slugify(file.name)}`);await uploadBytes(fileRef,file,{contentType:file.type});imageUrl=await getDownloadURL(fileRef)}const refDoc=id?doc(db,'posts',id):doc(db,'posts',crypto.randomUUID());await setDoc(refDoc,{title:title.value.trim(),slug:slugify(slug.value),category:category.value.trim(),author:author.value.trim()||'ArticleFeed Editorial Team',status:status.value,image:imageUrl,imageAlt:imageAlt.value.trim(),seoTitle:seoTitle.value.trim(),metaDescription:metaDescription.value.trim(),keyword:keyword.value.trim(),content:content.value.trim(),createdAt:createdAt||serverTimestamp(),updatedAt:serverTimestamp()},{merge:true});msg.className='message show success';msg.textContent='Article saved successfully.';if(!id)setTimeout(()=>location.href='posts.html',500)}catch(err){msg.className='message show error';msg.textContent=err.message}};init().catch(e=>{msg.className='message show error';msg.textContent=e.message});</script></body></html>
