```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Login | ArticleFeed</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#16a34a,#dc2626);
padding:20px;
}

.login-box{
width:100%;
max-width:420px;
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,.15);
}

.logo{
text-align:center;
font-size:34px;
font-weight:700;
margin-bottom:10px;
color:#16a34a;
}

.logo span{
color:#dc2626;
}

.subtitle{
text-align:center;
color:#666;
margin-bottom:30px;
}

.input-group{
margin-bottom:20px;
}

.input-group label{
display:block;
margin-bottom:8px;
font-weight:500;
}

.input-group input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:10px;
font-size:15px;
}

.input-group input:focus{
outline:none;
border-color:#16a34a;
}

.login-btn{
width:100%;
padding:15px;
background:#16a34a;
color:white;
border:none;
border-radius:10px;
font-size:16px;
font-weight:600;
cursor:pointer;
transition:.3s;
}

.login-btn:hover{
background:#15803d;
}

.message{
margin-top:15px;
text-align:center;
font-size:14px;
}

.home-link{
display:block;
text-align:center;
margin-top:20px;
text-decoration:none;
color:#dc2626;
font-weight:600;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">
Article<span>Feed</span>
</div>

<p class="subtitle">
Admin Login Panel
</p>

<form id="loginForm">

<div class="input-group">
<label>Email</label>
<input
type="email"
id="email"
placeholder="Enter Email"
required>
</div>

<div class="input-group">
<label>Password</label>
<input
type="password"
id="password"
placeholder="Enter Password"
required>
</div>

<button type="submit" class="login-btn">
Login
</button>

</form>

<div id="message" class="message"></div>

<a href="../index.html" class="home-link">
← Back to Website
</a>

</div>

<script type="module">

import {
auth
} from "../js/firebase.js";

import {
signInWithEmailAndPassword
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

const form = document.getElementById("loginForm");
const message = document.getElementById("message");

form.addEventListener("submit", async (e)=>{

e.preventDefault();

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

try{

await signInWithEmailAndPassword(
auth,
email,
password
);

message.style.color = "green";
message.innerHTML = "Login Successful...";

setTimeout(()=>{
window.location.href =
"dashboard.html";
},1000);

}catch(error){

message.style.color = "red";
message.innerHTML =
error.message;

}

});

</script>

</body>
</html>
```
