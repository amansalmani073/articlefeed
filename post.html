<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ArticleFeed</title>

<meta name="description" content="Read articles on ArticleFeed">

<link rel="stylesheet" href="css/style.css">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
rel="stylesheet">

<style>

.article-hero{
background:linear-gradient(135deg,#16a34a,#dc2626);
padding:80px 0;
color:white;
}

.article-hero h1{
font-size:48px;
margin-bottom:15px;
}

.article-meta{
display:flex;
gap:20px;
flex-wrap:wrap;
font-size:14px;
}

.article-container{
max-width:900px;
margin:auto;
padding:60px 20px;
}

.featured-image{
width:100%;
border-radius:20px;
margin-bottom:40px;
box-shadow:0 10px 30px rgba(0,0,0,.1);
}

.article-content{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.article-content h2{
margin-top:30px;
margin-bottom:15px;
color:#16a34a;
}

.article-content p{
line-height:1.9;
margin-bottom:20px;
}

.related-posts{
padding:80px 0;
background:#f8fafc;
}

.related-posts h2{
text-align:center;
margin-bottom:40px;
}

.related-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.related-card{
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

@media(max-width:768px){

.article-hero h1{
font-size:32px;
}

.article-content{
padding:25px;
}

}

</style>

</head>

<body>

<header class="header">

<div class="container">

<div class="logo">
Article<span>Feed</span>
</div>

<nav>
<a href="index.html">Home</a>
<a href="blogs.html">Blogs</a>
<a href="admin/login.html">Login</a>
</nav>

</div>

</header>

<section class="article-hero">

<div class="container">

<h1 id="postTitle">
Loading Article...
</h1>

<div class="article-meta">

<span id="postCategory">
Loading...
</span>

</div>

</div>

</section>

<section class="article-container">

<img
id="postImage"
class="featured-image"
src="https://via.placeholder.com/1200x700"
alt="Article Image">

<div class="article-content">

<div id="postContent">

Loading article content...

</div>

</div>

</section>

<section class="related-posts">

<div class="container">

<h2>
More Articles
</h2>

<div class="related-grid">

<div class="related-card">
Visit the blogs page to explore more articles.
</div>

</div>

</div>

</section>

<footer>

<div class="container">

<p>
© 2026 ArticleFeed. All Rights Reserved.
</p>

</div>

</footer>

<script type="module" src="js/blog.js"></script>

</body>

</html>
