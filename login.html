<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="robots" content="noindex,nofollow"><title>Admin Login | ArticleFeed</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"><link rel="stylesheet" href="../css/admin.css"></head><body class="login-page"><main class="login-card"><h1>Article<span style="color:#0e9f6e">Feed</span></h1><p>Sign in to manage articles and website settings.</p><form id="loginForm"><label class="form-group"><span>Email address</span><input id="email" type="email" autocomplete="username" required></label><label class="form-group"><span>Password</span><input id="password" type="password" autocomplete="current-password" required></label><button class="btn" type="submit">Sign in</button></form><div id="message" class="message" role="status"></div><p><a href="../index.html">← Return to website</a></p></main><script type="module">import{auth}from'../js/firebase.js';import{signInWithEmailAndPassword,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js';const form=document.getElementById('loginForm'),msg=document.getElementById('message');onAuthStateChanged(auth,u=>{if(u)location.replace('dashboard.html')});form.addEventListener('submit',async e=>{e.preventDefault();msg.className='message show';msg.textContent='Signing in…';try{await signInWithEmailAndPassword(auth,email.value.trim(),password.value);location.replace('dashboard.html')}catch(err){msg.className='message show error';msg.textContent='Login failed. Check your email and password.'}});</script></body></html>
